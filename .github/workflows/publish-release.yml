name: Publish Release

on:
  pull_request:
    types: [closed]
    branches:
      - master

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: publish-release-${{ github.event.pull_request.number }}
  cancel-in-progress: false

env:
  GH_TOKEN: ${{ github.token }}

jobs:
  publish:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.title, 'release: v')
    name: Publish tagged release
    runs-on: ubuntu-latest

    steps:
      - name: Check out merged source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Publish GitHub release
        shell: bash
        run: |
          tag="${{ github.event.pull_request.title }}"
          tag="${tag#release: }"
          prerelease="false"
          if [[ "$tag" == *-* ]]; then
            prerelease="true"
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release already exists for $tag"
            exit 0
          fi

          git archive --format=tar "$tag" | gzip -n > "/tmp/${tag}.tar.gz"
          sha256sum "/tmp/${tag}.tar.gz" > "/tmp/${tag}.tar.gz.sha256"

          gh release create "$tag" \
            "/tmp/${tag}.tar.gz" \
            "/tmp/${tag}.tar.gz.sha256" \
            --title "$tag" \
            --notes-file CHANGELOG.md \
            $( [[ "$prerelease" == "true" ]] && printf '%s' --prerelease )
