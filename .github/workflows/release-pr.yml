name: Publish Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Semantic version tag, for example v1.2.3 or v1.2.3-rc.1"
        required: true
        type: string

permissions:
  contents: write

env:
  GH_TOKEN: ${{ github.token }}

jobs:
  build:
    if: github.repository == 'poplanguage/pop'
    name: Build workspace
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Check out source
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
          targets: ${{ matrix.target }}

      - name: Cache Cargo build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install LLVM 22
        shell: bash
        run: |
          curl -fsSL https://apt.llvm.org/llvm.sh -o /tmp/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh 22
          sudo apt-get install -y llvm-22-dev

      - name: Build workspace
        env:
          LLVM_SYS_221_PREFIX: /usr/lib/llvm-22
        run: |
          cargo build -p pop-driver -p pop-standard -p pop-runtime-native --release --target "${{ matrix.target }}"
          bundle="pop-${{ matrix.target }}"
          mkdir -p "dist/$bundle"
          cp "target/${{ matrix.target }}/release/pop" "dist/$bundle/$bundle"
          cp "target/${{ matrix.target }}/release/libpop_standard.a" "dist/$bundle/"
          cp "target/${{ matrix.target }}/release/libpop_runtime_native.a" "dist/$bundle/"
          cd "dist/$bundle"
          zip -9 "../$bundle.zip" "$bundle" libpop_standard.a libpop_runtime_native.a
          cd ..
          sha256sum "$bundle.zip" > "$bundle.zip.sha256"
          rm -rf "$bundle"

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: pop-${{ matrix.target }}
          path: |
            dist/pop-${{ matrix.target }}.zip
            dist/pop-${{ matrix.target }}.zip.sha256

  publish:
    if: github.repository == 'poplanguage/pop' && github.actor == 'kleeedolinux'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          pattern: pop-*
          path: dist
          merge-multiple: true

      - name: Publish release
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          tag="${INPUT_TAG:-${GITHUB_REF_NAME}}"
          if [[ ! "$tag" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid semantic version tag: $tag"
            exit 1
          fi

          prerelease_args=()
          [[ "$tag" == *-* ]] && prerelease_args+=(--prerelease)

          gh release create "$tag" \
            dist/* \
            --title "$tag" \
            --generate-notes \
            "${prerelease_args[@]}"
