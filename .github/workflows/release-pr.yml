name: Publish Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Semantic version tag, for example v1.2.3 or v1.2.3-rc.1"
        required: true
        type: string

permissions:
  contents: write

env:
  GH_TOKEN: ${{ github.token }}

jobs:
  publish:
    if: github.actor == 'kleeedolinux'
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Publish release
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          tag="${INPUT_TAG:-${GITHUB_REF_NAME}}"
          if [[ ! "$tag" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid semantic version tag: $tag"
            exit 1
          fi

          if ! git rev-parse "$tag^{commit}" >/dev/null 2>&1; then
            git fetch origin "refs/tags/$tag:refs/tags/$tag"
          fi

          archive="/tmp/${tag}.tar.gz"
          checksum="/tmp/${tag}.tar.gz.sha256"
          git archive --format=tar "$tag" | gzip -n > "$archive"
          sha256sum "$archive" > "$checksum"

          prerelease_args=()
          [[ "$tag" == *-* ]] && prerelease_args+=(--prerelease)

          gh release create "$tag" \
            "$archive" \
            "$checksum" \
            --title "$tag" \
            --generate-notes \
            "${prerelease_args[@]}"
