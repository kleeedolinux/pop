name: Publish Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Semantic version tag, for example v1.2.3 or v1.2.3-rc.1"
        required: true
        type: string

permissions:
  contents: write

env:
  GH_TOKEN: ${{ github.token }}

jobs:
  build:
    name: Build workspace
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
          targets: ${{ matrix.target }}

      - name: Install ARM linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install LLVM 22
        shell: bash
        run: |
          curl -fsSL https://apt.llvm.org/llvm.sh -o /tmp/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh 22

      - name: Build workspace
        env:
          LLVM_SYS_221_PREFIX: /usr/lib/llvm-22
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: |
          cargo build -p pop-driver --release --target "${{ matrix.target }}"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/pop" "dist/pop-${{ matrix.target }}"
          sha256sum "dist/pop-${{ matrix.target }}" > "dist/pop-${{ matrix.target }}.sha256"

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: pop-${{ matrix.target }}
          path: dist/

  publish:
    if: github.actor == 'kleeedolinux'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          pattern: pop-*
          path: dist
          merge-multiple: true

      - name: Publish release
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          tag="${INPUT_TAG:-${GITHUB_REF_NAME}}"
          if [[ ! "$tag" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid semantic version tag: $tag"
            exit 1
          fi

          prerelease_args=()
          [[ "$tag" == *-* ]] && prerelease_args+=(--prerelease)

          gh release create "$tag" \
            dist/* \
            --title "$tag" \
            --generate-notes \
            "${prerelease_args[@]}"
