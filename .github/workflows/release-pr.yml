name: Publish Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Semantic version tag, for example v1.2.3 or v1.2.3-rc.1"
        required: true
        type: string

permissions:
  contents: write

env:
  GH_TOKEN: ${{ github.token }}

jobs:
  build:
    name: Build workspace
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Check out source
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
          targets: ${{ matrix.target }}

      - name: Cache Cargo build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Cache LLVM 22
        id: llvm-cache
        uses: actions/cache@v4
        with:
          path: /opt/llvm-22
          key: ${{ runner.os }}-${{ matrix.target }}-llvm-22-dev-v3

      - name: Install LLVM 22
        if: steps.llvm-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          curl -fsSL https://apt.llvm.org/llvm.sh -o /tmp/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh 22
          sudo apt-get install -y llvm-22-dev
          sudo mkdir -p /opt/llvm-22
          sudo cp -a /usr/lib/llvm-22/. /opt/llvm-22/
          sudo mkdir -p /opt/llvm-22/include
          header_dir="$(dirname "$(find /usr -path '*/llvm-c/Target.h' -print -quit)")"
          test -n "$header_dir" -a -f "$header_dir/Target.h"
          sudo cp -a "$header_dir" /opt/llvm-22/include/
          test -f /opt/llvm-22/include/llvm-c/Target.h
          sudo chown -R "$USER":"$USER" /opt/llvm-22

      - name: Build workspace
        env:
          LLVM_SYS_221_PREFIX: /opt/llvm-22
        run: |
          cargo build -p pop-driver --release --target "${{ matrix.target }}"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/pop" "dist/pop-${{ matrix.target }}"
          sha256sum "dist/pop-${{ matrix.target }}" > "dist/pop-${{ matrix.target }}.sha256"

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: pop-${{ matrix.target }}
          path: dist/

  publish:
    if: github.actor == 'kleeedolinux'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          pattern: pop-*
          path: dist
          merge-multiple: true

      - name: Publish release
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          tag="${INPUT_TAG:-${GITHUB_REF_NAME}}"
          if [[ ! "$tag" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid semantic version tag: $tag"
            exit 1
          fi

          prerelease_args=()
          [[ "$tag" == *-* ]] && prerelease_args+=(--prerelease)

          gh release create "$tag" \
            dist/* \
            --title "$tag" \
            --generate-notes \
            "${prerelease_args[@]}"
