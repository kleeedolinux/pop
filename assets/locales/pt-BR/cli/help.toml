[messages."cli.usage"]
text = "Uso:\n    pop new <caminho> [--name <Package.Name>] [--library|--binary]\n    pop initialize [caminho] [--name <Package.Name>] [--library|--binary]\n    pop check <fonte.pop> [--dump <hir|mir|ll>]...\n    pop check --manifestPath <bubble.toml>\n    pop build <fonte.pop> --output <executável>\n    pop build --manifestPath <bubble.toml>\n    pop documentation --manifestPath <bubble.toml>\n    pop transpile <fonte.pop> --to c\n    pop run <fonte.pop> [-- <argumentos>...]\n    pop run --manifestPath <bubble.toml> [-- <argumentos>...]\n\nO caminho direto para o arquivo-fonte é um modo bootstrap de inspeção do compilador. Ele verifica um Module em uma Bubble efêmera e não define identidade de Package nem de Bubble. Os dumps de IR são texto de depuração determinístico para esta versão do compilador, não formatos de serialização estáveis."
