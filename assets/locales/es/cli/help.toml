[messages."cli.usage"]
text = "Uso:\n    pop new <ruta> [--name <Package.Name>] [--library|--binary]\n    pop initialize [ruta] [--name <Package.Name>] [--library|--binary]\n    pop check <fuente.pop> [--dump <hir|mir|ll>]...\n    pop check --manifestPath <bubble.toml>\n    pop build <fuente.pop> --output <ejecutable>\n    pop build --manifestPath <bubble.toml>\n    pop documentation --manifestPath <bubble.toml>\n    pop transpile <fuente.pop> --to c\n    pop run <fuente.pop> [-- <argumentos>...]\n    pop run --manifestPath <bubble.toml> [-- <argumentos>...]\n\nLa ruta directa al archivo fuente es un modo bootstrap de inspección del compilador. Comprueba un Module en una Bubble efímera y no define la identidad de Package ni de Bubble. Los volcados de IR son texto de depuración determinista para esta versión del compilador, no formatos de serialización estables."
