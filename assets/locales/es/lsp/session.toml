[messages."lsp.ready"]
text = "el servidor de lenguaje de Pop Lang está listo"

[messages."lsp.documentNotOpen"]
text = "el documento `{uri}` no está abierto"

[messages."lsp.documentAlreadyOpen"]
text = "el documento `{uri}` ya está abierto"

[messages."lsp.staleDocument"]
text = "el documento `{uri}` rechazó la versión obsoleta {found}; la versión actual es {expected}"

[messages."lsp.sourceRejected"]
